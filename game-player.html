<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#000" />
  <title>Game Player</title>
  <link rel="stylesheet" href="/css/game-player.css" />
</head>
<body oncontextmenu="return false">
  <div class="header">
    <h1 id="gameTitle">🎮 Game</h1>
    <a href="/" class="back-link" id="backLink">← Back Home</a>
  </div>

  <div class="game-container">
    <div class="loading" id="loading">Loading game...</div>
    <div class="error-message" id="errorMessage" style="display: none;"></div>
    <iframe id="gameFrame" allow="accelerometer; ambient light sensor; autoplay; camera; encrypted-media; fullscreen; geolocation; gyroscope; microphone; midi; payment; usb; vr; xr-spatial-tracking" sandbox="allow-forms allow-modals allow-pointer-lock allow-popups allow-same-origin allow-scripts allow-top-navigation-by-user-activation" style="width: 100%; height: 100%; border: none; display: none;"></iframe>
    <button class="fullscreen-btn" id="fullscreenBtn" aria-label="Toggle fullscreen mode">⛶ Fullscreen</button>
  </div>

  <script src="/js/game-player-universal.js"></script>
</body>
</html>
